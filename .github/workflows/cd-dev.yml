name: CD Dev

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker tag to build/deploy (default: timestamp)"
        required: false
        type: string
      run_smoke:
        description: "Run manual smoke after deploy"
        required: false
        default: true
        type: boolean

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare env file
        shell: bash
        run: |
          TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG_INPUT" ]; then
            TAG_INPUT="$(date -u +%Y%m%d-%H%M)"
          fi
          echo "IMAGE_TAG=$TAG_INPUT" >> "$GITHUB_ENV"
          cat > infra/azure/dev.ci.env <<EOF
          AZ_SUBSCRIPTION_ID=${{ secrets.AZ_SUBSCRIPTION_ID }}
          AZ_LOCATION=${{ vars.AZ_LOCATION || 'brazilsouth' }}
          AZ_ENV=dev
          AZ_RESOURCE_GROUP=${{ secrets.AZ_RESOURCE_GROUP_DEV }}
          AZ_ACR_NAME=${{ secrets.AZ_ACR_NAME_DEV }}
          AZ_LOG_ANALYTICS_NAME=${{ vars.AZ_LOG_ANALYTICS_NAME_DEV || 'log-cotation-scrapers-dev' }}
          AZ_CONTAINERAPPS_ENV_NAME=${{ secrets.AZ_CONTAINERAPPS_ENV_NAME_DEV }}
          AZ_KEYVAULT_NAME=${{ secrets.AZ_KEYVAULT_NAME_DEV }}
          AZ_STORAGE_ACCOUNT_NAME=${{ vars.AZ_STORAGE_ACCOUNT_NAME_DEV || 'stcotscrapersdev' }}
          AZ_FILE_SHARE_NAME=${{ vars.AZ_FILE_SHARE_NAME_DEV || 'cotation-artifacts' }}
          AZ_CONTAINERAPP_JOB_NAME=${{ secrets.AZ_CONTAINERAPP_JOB_NAME_DEV }}
          AZ_TAG_PROJECT=cotation-scrapers
          AZ_TAG_OWNER=data-analytics
          AZ_TAG_COST_CENTER=not-set
          AZ_IMAGE_NAME=cotation-scrapers
          AZ_JOB_CONTAINER_NAME=cotation-scrapers
          AZ_JOB_CRON_UTC=${{ vars.AZ_JOB_CRON_UTC_DEV || '0 7 * * 1-5' }}
          EOF

      - name: Build and push image (ACR Build)
        shell: pwsh
        run: |
          ./infra/azure/build_and_push_image.ps1 -EnvFile ./infra/azure/dev.ci.env -ImageTag "${{ env.IMAGE_TAG }}" -UseAcrBuild

      - name: Configure schedule/image
        shell: pwsh
        run: |
          ./infra/azure/configure_job_schedule.ps1 -EnvFile ./infra/azure/dev.ci.env -ImageTag "${{ env.IMAGE_TAG }}"

      - name: Optional smoke
        if: ${{ github.event.inputs.run_smoke == 'true' }}
        shell: pwsh
        run: |
          ./infra/azure/start_job_smoke.ps1 -EnvFile ./infra/azure/dev.ci.env -NoWait
