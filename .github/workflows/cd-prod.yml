name: CD Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to deploy in prod"
        required: true
        type: string
      run_smoke:
        description: "Run manual smoke after deploy"
        required: false
        default: true
        type: boolean

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare env file
        shell: bash
        run: |
          cat > infra/azure/prod.ci.env <<EOF
          AZ_SUBSCRIPTION_ID=${{ secrets.AZ_SUBSCRIPTION_ID }}
          AZ_LOCATION=${{ vars.AZ_LOCATION || 'brazilsouth' }}
          AZ_ENV=prod
          AZ_RESOURCE_GROUP=${{ secrets.AZ_RESOURCE_GROUP_PROD }}
          AZ_ACR_NAME=${{ secrets.AZ_ACR_NAME_PROD }}
          AZ_LOG_ANALYTICS_NAME=${{ vars.AZ_LOG_ANALYTICS_NAME_PROD || 'log-quotation-scrapers-prod' }}
          AZ_CONTAINERAPPS_ENV_NAME=${{ secrets.AZ_CONTAINERAPPS_ENV_NAME_PROD }}
          AZ_KEYVAULT_NAME=${{ secrets.AZ_KEYVAULT_NAME_PROD }}
          AZ_STORAGE_ACCOUNT_NAME=${{ vars.AZ_STORAGE_ACCOUNT_NAME_PROD || 'stcotscrapersprod' }}
          AZ_FILE_SHARE_NAME=${{ vars.AZ_FILE_SHARE_NAME_PROD || 'cotation-artifacts' }}
          AZ_CONTAINERAPP_JOB_NAME=${{ secrets.AZ_CONTAINERAPP_JOB_NAME_PROD }}
          AZ_TAG_PROJECT=quotation-scrapers
          AZ_TAG_OWNER=data-analytics
          AZ_TAG_COST_CENTER=not-set
          AZ_IMAGE_NAME=quotation-scrapers
          AZ_JOB_CONTAINER_NAME=quotation-scrapers
          AZ_JOB_CRON_UTC=${{ vars.AZ_JOB_CRON_UTC_PROD || '0 7 * * 1-5' }}
          EOF

      - name: Deploy existing image tag to prod
        shell: pwsh
        run: |
          ./infra/azure/configure_job_schedule.ps1 -EnvFile ./infra/azure/prod.ci.env -ImageTag "${{ github.event.inputs.image_tag }}"

      - name: Optional smoke
        if: ${{ github.event.inputs.run_smoke == 'true' }}
        shell: pwsh
        run: |
          ./infra/azure/start_job_smoke.ps1 -EnvFile ./infra/azure/prod.ci.env -NoWait

